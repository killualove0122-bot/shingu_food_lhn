name: '🍱 학교 식단 자동 배달 로봇'

on:
  schedule:
    # 📝 UTC 기준 (한국 시간 KST = UTC + 9)
    # 아래 설정은 한국 시간 기준 매일 아침 08:30에 실행됩니다.
    - cron: '30 23 * * *' 
  workflow_dispatch: # 👈 [중요] 버튼을 눌러 수동으로 즉시 실행할 수 있게 합니다.

jobs:
  run-crawler:
    runs-on: ubuntu-latest # 가상의 리눅스 서버에서 실행합니다.

    steps:
      - name: 📂 코드 가져오기
        uses: actions/checkout@v3

      - name: 🐍 파이썬 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 📦 필요한 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🚀 식단 크롤러 실행
        env:
          # GitHub Secrets에 등록한 값을 환경변수로 연결합니다.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python send_menu_to_telegram.py
